[raw.color]
canvas = "#eef3fb"
desktop = "#dde6f4"
text-primary = "#152236"
text-secondary = "#51617a"
text-muted = "#74839b"
text-inverse = "#f7fbff"
accent = "#2f7cf6"
accent-strong = "#195fd8"
focus = "#77a7ff"
success = "#2f9d66"
warning = "#c88d1f"
danger = "#cf5467"
neutral-0 = "rgba(255, 255, 255, 0.92)"
neutral-1 = "rgba(255, 255, 255, 0.8)"
neutral-2 = "rgba(245, 248, 255, 0.72)"
neutral-3 = "rgba(225, 234, 248, 0.62)"
neutral-4 = "rgba(203, 217, 237, 0.48)"
border-soft = "rgba(130, 156, 196, 0.24)"
border-strong = "rgba(111, 137, 181, 0.38)"
highlight = "rgba(255, 255, 255, 0.66)"
highlight-strong = "rgba(255, 255, 255, 0.82)"
shadow = "rgba(49, 76, 122, 0.18)"
shadow-strong = "rgba(40, 63, 101, 0.24)"
selected = "rgba(64, 122, 255, 0.18)"
selected-strong = "rgba(64, 122, 255, 0.42)"
disabled = "rgba(228, 236, 247, 0.56)"
disabled-content = "0.48"

[raw.space]
0 = "0"
2 = "2px"
4 = "4px"
8 = "8px"
12 = "12px"
16 = "16px"
20 = "20px"
24 = "24px"
28 = "28px"
32 = "32px"
40 = "40px"
48 = "48px"

[raw.type]
family-sans = "\"Noto Sans\", \"Source Sans 3\", \"Segoe UI\", sans-serif"
family-mono = "\"IBM Plex Mono\", \"SFMono-Regular\", monospace"
size-caption = "12px"
size-label = "13px"
size-body = "14px"
size-title = "16px"
size-code = "13px"
weight-regular = "400"
weight-medium = "500"
weight-semibold = "600"
weight-bold = "700"
line-tight = "1.2"
line-body = "1.45"
line-title = "1.25"
tracking-tight = "-0.02em"
tracking-normal = "0"
tracking-wide = "0.02em"
tracking-caps = "0.08em"

[raw.blur]
embedded = "12px"
raised = "18px"
floating = "24px"
modal = "30px"
fallback = "0px"

[raw.radius]
8 = "8px"
12 = "12px"
16 = "16px"
round = "999px"

[raw.motion]
duration-fast = "120ms"
duration-standard = "180ms"
duration-slow = "260ms"
easing-standard = "cubic-bezier(0.22, 0.88, 0.28, 1)"
easing-emphasized = "cubic-bezier(0.18, 0.92, 0.22, 1)"

[raw.border]
width-1 = "1px"
width-2 = "2px"
focus-ring-width = "3px"

[semantic.surface]
shell-background = "rgba(255, 255, 255, 0.26)"
shell-border = "rgba(255, 255, 255, 0.16)"
shell-highlight = "rgba(255, 255, 255, 0.18)"
shell-blur = "var(--origin-raw-blur-embedded)"
shell-shadow = "none"
taskbar-background = "rgba(255, 255, 255, 0.54)"
taskbar-border = "var(--origin-raw-color-border-soft)"
taskbar-highlight = "var(--origin-raw-color-highlight)"
taskbar-blur = "var(--origin-raw-blur-embedded)"
taskbar-shadow = "0 12px 28px var(--origin-raw-color-shadow)"
window-background = "rgba(255, 255, 255, 0.7)"
window-border = "var(--origin-raw-color-border-soft)"
window-highlight = "var(--origin-raw-color-highlight)"
window-blur = "var(--origin-raw-blur-raised)"
window-shadow = "0 18px 40px var(--origin-raw-color-shadow)"
window-active-background = "rgba(255, 255, 255, 0.78)"
window-active-border = "var(--origin-raw-color-border-strong)"
window-active-highlight = "var(--origin-raw-color-highlight-strong)"
window-active-blur = "var(--origin-raw-blur-floating)"
window-active-shadow = "0 24px 48px var(--origin-raw-color-shadow-strong)"
window-inactive-background = "rgba(247, 250, 255, 0.64)"
window-inactive-border = "var(--origin-raw-color-border-soft)"
window-inactive-highlight = "var(--origin-raw-color-highlight)"
window-inactive-blur = "var(--origin-raw-blur-raised)"
window-inactive-shadow = "0 16px 34px var(--origin-raw-color-shadow)"
menu-background = "rgba(252, 253, 255, 0.84)"
menu-border = "var(--origin-raw-color-border-strong)"
menu-highlight = "var(--origin-raw-color-highlight-strong)"
menu-blur = "var(--origin-raw-blur-floating)"
menu-shadow = "0 18px 40px var(--origin-raw-color-shadow-strong)"
modal-background = "rgba(252, 253, 255, 0.9)"
modal-border = "var(--origin-raw-color-border-strong)"
modal-highlight = "var(--origin-raw-color-highlight-strong)"
modal-blur = "var(--origin-raw-blur-modal)"
modal-shadow = "0 24px 52px var(--origin-raw-color-shadow-strong)"
embedded-background = "rgba(255, 255, 255, 0.58)"
embedded-border = "var(--origin-raw-color-border-soft)"
embedded-highlight = "var(--origin-raw-color-highlight)"
embedded-blur = "var(--origin-raw-blur-embedded)"
embedded-shadow = "0 10px 20px var(--origin-raw-color-shadow)"
raised-background = "rgba(255, 255, 255, 0.68)"
raised-border = "var(--origin-raw-color-border-soft)"
raised-highlight = "var(--origin-raw-color-highlight)"
raised-blur = "var(--origin-raw-blur-raised)"
raised-shadow = "0 14px 28px var(--origin-raw-color-shadow)"

[semantic.control]
neutral-background = "rgba(255, 255, 255, 0.52)"
neutral-border = "var(--origin-raw-color-border-soft)"
neutral-highlight = "var(--origin-raw-color-highlight)"
accent-background = "rgba(47, 124, 246, 0.18)"
accent-border = "rgba(47, 124, 246, 0.38)"
accent-highlight = "rgba(255, 255, 255, 0.22)"
danger-background = "rgba(207, 84, 103, 0.18)"
danger-border = "rgba(207, 84, 103, 0.38)"
danger-highlight = "rgba(255, 255, 255, 0.18)"

[semantic.text]
primary = "var(--origin-raw-color-text-primary)"
secondary = "var(--origin-raw-color-text-secondary)"
muted = "var(--origin-raw-color-text-muted)"
inverse = "var(--origin-raw-color-text-inverse)"

[semantic.border]
standard = "var(--origin-raw-color-border-soft)"
focus = "var(--origin-raw-color-focus)"
selected = "var(--origin-raw-color-selected-strong)"

[semantic.state]
hover-surface = "rgba(255, 255, 255, 0.74)"
active-surface = "rgba(222, 231, 244, 0.84)"
selected-surface = "var(--origin-raw-color-selected)"
disabled-surface = "var(--origin-raw-color-disabled)"
disabled-content = "var(--origin-raw-color-disabled-content)"
focus-ring = "rgba(119, 167, 255, 0.28)"

[semantic.shell]
taskbar-height = "44px"
taskbar-button-height = "32px"
taskbar-clock-min-width = "84px"
taskbar-padding-inline = "12px"
taskbar-padding-block = "6px"
taskbar-section-gap = "8px"
taskbar-item-gap = "4px"
dock-height = "46px"
dock-button-size = "40px"
dock-spacing = "6px"
dock-padding = "6px"
dock-floating-offset = "10px"
titlebar-height = "38px"
titlebar-control-size = "28px"
desktop-padding = "12px"
window-content-padding = "16px"
window-min-width = "360px"
window-min-height = "240px"
resize-handle-edge = "8px"
resize-handle-corner = "12px"
resize-handle-hit-outset = "4px"
desktop-icon-tile-size = "80px"
menu-width = "240px"
panel-width = "360px"
notification-width = "360px"

[semantic.layer]
wallpaper = "0"
desktop-backdrop = "10"
taskbar = "30"
windows = "40"
menus = "60"
modal = "80"
embedded-shadow = "0 10px 20px var(--origin-raw-color-shadow)"
raised-shadow = "0 14px 28px var(--origin-raw-color-shadow)"
floating-shadow = "0 20px 40px var(--origin-raw-color-shadow-strong)"
modal-shadow = "0 26px 52px var(--origin-raw-color-shadow-strong)"

[theme]
default = "light"

