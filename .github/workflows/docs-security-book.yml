name: Docs

on:
  pull_request:
    paths:
      - "docs/security-rust/**"
      - "testing/security-labs/**"
      - "shared/secure-patterns/**"
      - "shared/exploit-mitigation/**"
      - "shared/runtime-security/**"
      - "shared/security-instrumentation/**"
      - "xtask/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docs-security-book.yml"
      - ".github/actions/**"
  push:
    branches:
      - main
    paths:
      - "docs/security-rust/**"
      - "testing/security-labs/**"
      - "shared/secure-patterns/**"
      - "shared/exploit-mitigation/**"
      - "shared/runtime-security/**"
      - "shared/security-instrumentation/**"
      - "xtask/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docs-security-book.yml"
      - ".github/actions/**"
  merge_group:

permissions:
  contents: read

jobs:
  security-book:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cargo-bins: |
            mdbook
            cargo-nextest

      - name: Doctor docs toolchain
        run: cargo xtask doctor --domain docs --ci

      - name: Validate security book
        run: cargo xtask run docs-security-book-test
