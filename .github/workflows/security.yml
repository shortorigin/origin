name: Security

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  cargo-audit:
    runs-on: ubuntu-latest
    env:
      CARGO_AUDIT_VERSION: 0.22.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-core-ubuntu-stable-v1
          cache-all-crates: "false"
          cache-bin: "false"
          cache-workspace-crates: "false"

      - name: Cache cargo-audit
        id: cargo-audit-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-${{ env.CARGO_AUDIT_VERSION }}

      - name: Install cargo-audit
        if: steps.cargo-audit-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked --version "${CARGO_AUDIT_VERSION}"

      - name: Run cargo audit
        run: cargo audit

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: rust
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          build-mode: ${{ matrix.build-mode }}

      - name: Install Rust toolchain
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: matrix.language == 'rust'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-ui-ubuntu-stable-v1
          cache-all-crates: "false"
          cache-bin: "false"
          cache-workspace-crates: "false"

      - name: Install Rust UI dependencies
        if: matrix.language == 'rust'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Build Rust workspace for CodeQL
        if: matrix.language == 'rust'
        run: cargo check --workspace --all-targets --all-features

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

  security-gate:
    needs:
      - dependency-review
      - cargo-audit
      - codeql
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Assert security jobs succeeded
        env:
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
          CARGO_AUDIT_RESULT: ${{ needs.cargo-audit.result }}
          CODEQL_RESULT: ${{ needs.codeql.result }}
        run: |
          for result in "${DEPENDENCY_REVIEW_RESULT}" "${CARGO_AUDIT_RESULT}" "${CODEQL_RESULT}"; do
            if [[ "${result}" != "success" && "${result}" != "skipped" ]]; then
              echo "Security prerequisite failed with result ${result}"
              exit 1
            fi
          done
