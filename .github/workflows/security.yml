name: Security

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: ./.github/actions/install-rust

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: rust
            build-mode: none
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          build-mode: ${{ matrix.build-mode }}

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

  security-gate:
    needs:
      - dependency-review
      - cargo-audit
      - codeql
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Assert security jobs succeeded
        env:
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
          CARGO_AUDIT_RESULT: ${{ needs.cargo-audit.result }}
          CODEQL_RESULT: ${{ needs.codeql.result }}
        run: |
          for result in "${DEPENDENCY_REVIEW_RESULT}" "${CARGO_AUDIT_RESULT}" "${CODEQL_RESULT}"; do
            if [[ "${result}" != "success" && "${result}" != "skipped" ]]; then
              echo "Security prerequisite failed with result ${result}"
              exit 1
            fi
          done
