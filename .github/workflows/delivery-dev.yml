name: Delivery Dev

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  delivery-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Verify delivery descriptor rendering
        run: cargo xtask artifacts delivery components --environment dev --tag "sha-${GITHUB_SHA}" --output-dir target/delivery/components

      - name: Note deployment policy
        run: echo "Automated deployment is deferred until repo-owned deployment actions are implemented."
