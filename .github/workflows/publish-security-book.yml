name: Publish Security Book

on:
  push:
    branches:
      - main
    paths:
      - "docs/security-rust/**"
      - "testing/security-labs/**"
      - "shared/secure-patterns/**"
      - "shared/exploit-mitigation/**"
      - "shared/runtime-security/**"
      - "shared/security-instrumentation/**"
      - "xtask/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/publish-security-book.yml"
      - ".github/actions/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: security-book-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cargo-bins: |
            mdbook

      - name: Build security book
        run: cargo xtask docs security-book build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/security-rust/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
