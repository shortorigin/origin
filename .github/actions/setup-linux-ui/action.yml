name: Setup Linux UI
description: Install Linux desktop packages required for Tauri and browser-parity UI builds in CI.

runs:
  using: composite
  steps:
    - name: Install Linux UI packages
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          patchelf \
          libxdo-dev
