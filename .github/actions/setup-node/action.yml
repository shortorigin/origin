name: Setup Node
description: Install Node.js with npm caching for workspace task wrappers.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: "20"
  cache-dependency-path:
    description: Lockfile path or newline-separated lockfile paths used for npm caching.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
