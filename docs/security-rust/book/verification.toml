[[chapters]]
page = "src/tutorials/runtime-policy-lab.md"
commands = [
  "cargo xtask docs security-book test",
  "cargo nextest run -p secure-patterns -p exploit-mitigation -p runtime-security -p security-instrumentation -p runtime-security-labs",
  "cargo check -p security-example-wasm-sandboxing",
]
artifacts = [
  "testing/security-labs/runtime-security/fixtures/oversized-state-id.txt",
  "testing/security-labs/runtime-security/fixtures/busy-loop.wat",
  "testing/security-labs/runtime-security/fixtures/guest-invalid-json.wat",
]
examples = ["docs/security-rust/examples/wasm-sandboxing/Cargo.toml"]
research = ["docs/security-rust/research/experiments/runtime-policy-matrix.md"]

[[chapters]]
page = "src/how-to/harden-wasm-components.md"
commands = [
  "cargo test -p wasmcloud-smoke-tests -p runtime-security-labs",
  "cargo check -p security-example-distributed-security",
]
artifacts = [
  "platform/wasmcloud/bindings/src/lib.rs",
  "schemas/wit/v1/platform.wit",
]
examples = ["docs/security-rust/examples/distributed-security/Cargo.toml"]
research = ["docs/security-rust/research/threat-models/runtime-plane-threat-model.md"]

[[chapters]]
page = "src/reference/toolchain-and-validation.md"
commands = [
  "cargo xtask docs security-book build",
